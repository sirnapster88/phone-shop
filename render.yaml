services:
  - type: web
    name: phone-shop-demo
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: sh -c 'python manage.py migrate --noinput && python manage.py bootstrap_demo_admin && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT'
    healthCheckPath: /healthz/
    autoDeployTrigger: commit
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: phone-shop-demo.onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://phone-shop-demo.onrender.com
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "true"
      - key: DJANGO_SESSION_COOKIE_SECURE
        value: "true"
      - key: DJANGO_CSRF_COOKIE_SECURE
        value: "true"
      - key: DJANGO_SECURE_HSTS_SECONDS
        value: "31536000"
      - key: TELEGRAM_WEBHOOK_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: DEMO_ADMIN_USERNAME
        sync: false
      - key: DEMO_ADMIN_PASSWORD
        sync: false
      - key: DEMO_ADMIN_EMAIL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_OPERATOR_CHAT_ID
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        sync: false
