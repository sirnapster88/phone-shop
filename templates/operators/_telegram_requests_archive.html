{% if archived_requests %}
<div class="telegram-archive">
    <details class="telegram-archive-toggle">
        <summary>
            <div class="d-flex flex-column flex-lg-row justify-content-between align-items-start align-items-lg-center gap-3">
                <div>
                    <h5 class="mb-1">Архив заявок</h5>
                    <div class="section-note">Закрытые и завершённые обращения скрыты из основной рабочей ленты.</div>
                </div>
                <span class="btn btn-outline-secondary disabled">
                    <i class="bi bi-archive"></i> {{ archived_requests_count }}
                </span>
            </div>
        </summary>
        <div class="telegram-archive-body">
            <div class="telegram-requests-stack px-3 pb-3">
                {% for item in archived_requests %}
                    {% include 'operators/_telegram_request_card.html' with item=item archived=True %}
                {% endfor %}
            </div>
        </div>
    </details>
</div>
{% endif %}
